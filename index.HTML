            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);

            padding: 20px;

            flex-direction: column;
            align-items: center;

        .app-container {

            max-width: 900px;
            margin: 0 auto;
        }

            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 32px;
            box-shadow: 0 25px 50px -8px rgba(0,20,40,0.3);
            border: 1px solid rgba(255,255,255,0.6);
            margin-bottom: 20px;

            body { padding: 10px; }
            .main-card { padding: 20px 16px; border-radius: 32px; }
        }
        h1, h2, h3 {
            font-weight: 600;
            letter-spacing: -0.02em;
            word-break: break-word;
        }
        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            border-left: 8px solid #2a5298;
            padding-left: 20px;
        }
        @media (max-width: 700px) {

        }
        h2 {

            margin-bottom: 8px;
            line-height: 1.3;
            color: #1e3c72;
        }
        .title-sub {
            font-size: 1.3rem;
            color: #2a5298;
            margin-bottom: 20px;
            font-weight: 500;
            padding-left: 4px;
        }

        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .label-input {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 10px 24px;
            border-radius: 60px;
            box-shadow: inset 2px 2px 8px #b8c3d0, inset -4px -4px 8px #ffffff;

        }

            color: #1e2f4d;

        }
        .label-input input, .label-input select {

            background: transparent;

            padding: 8px 0;
            outline: none;
            font-weight: 500;
            width: 100%;
            min-width: 0;
        }
        .btn-group {

            flex-wrap: wrap;
            gap: 16px;
            margin: 20px 0 10px;
            justify-content: center;

        .btn {

            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.2rem;

            cursor: pointer;
            color: #1e2f4d;
            display: inline-flex;

    // Chỉ cần khai báo biến với tên theo mẫu E4_U{unit}_B{bai}
    // =====================================================

    // Registry chứa tất cả các bài học
    window.LESSON_REGISTRY = {};

    // Hàm quét window để tìm các biến có tên dạng E4_..._...
    function scanLessons() {
        const lessonRegex = /^E4_U(\d+)_B(\d+)$/; // Lớp 4
        for (let key in window) {
            if (window.hasOwnProperty(key)) {
                const match = key.match(lessonRegex);
                if (match) {
                    const unit = match[1]; // unit, ví dụ "1"
                    const bai = match[2];  // bài, ví dụ "2"
                    const data = window[key];
                    // Kiểm tra xem data có cấu trúc bài học không (có P1, P2,...)
                    if (data && typeof data === 'object' && data.P1 !== undefined) {
                        if (!LESSON_REGISTRY['4']) LESSON_REGISTRY['4'] = {};
                        if (!LESSON_REGISTRY['4'][`U${unit}`]) LESSON_REGISTRY['4'][`U${unit}`] = {};
                        LESSON_REGISTRY['4'][`U${unit}`][`B${bai}`] = data;
                    }
                }
            }
        }
    }

    function sortVoicesByPlatform(voices) {
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isIOS) {
            // Đưa giọng Samantha lên đầu (nếu có)
            const samanthaIndex = voices.findIndex(v => v.name.toLowerCase().includes('samantha'));
            if (samanthaIndex !== -1) {
                const samantha = voices[samanthaIndex];
                const otherVoices = voices.filter((_, idx) => idx !== samanthaIndex);
                return [samantha, ...otherVoices];
            }
            return voices;
        } else {
            // Desktop / Android: ưu tiên Google, Microsoft lên đầu
            const googleVoices = voices.filter(v => v.name.toLowerCase().includes('google'));
            const microsoftVoices = voices.filter(v => v.name.toLowerCase().includes('microsoft'));
            const otherVoices = voices.filter(v => !v.name.toLowerCase().includes('google') && !v.name.toLowerCase().includes('microsoft'));
            return [...googleVoices, ...microsoftVoices, ...otherVoices];
        }
    }

    // ---------- HÀM PHÁT ÂM (giữ nguyên) ----------
    function stopAllAudio() {
        speechSynthesis.cancel();
        if (audioTimeout) {
            clearTimeout(audioTimeout);
            audioTimeout = null;
        }
        audioQueue = [];
        isPaused = false;
    }

    function pauseAudio() {
        if (speechSynthesis.speaking) {
            speechSynthesis.pause();
            isPaused = true;
        }
        if (audioTimeout) {
            clearTimeout(audioTimeout);
            audioTimeout = null;
        }
    }

    function resumeAudio() {
        if (isPaused && speechSynthesis.paused) {
            speechSynthesis.resume();
            isPaused = false;
            return;
        }
    }

    function getVoiceForId(id) {
        if (voiceMode === 1) return singleVoice;
        return (id % 2 === 1) ? oddVoice : evenVoice;
    }

    function playAudioSentences(sentences, gapSec, loop) {
        stopAllAudio();
        if (!sentences || sentences.length === 0) return;

        sentences.forEach(item => {
            for (let i = 0; i < loop; i++) {
                audioQueue.push({ text: item.word, id: item.id });
            }
        });

        let index = 0;
        const playNext = () => {
            if (index >= audioQueue.length) {
                stopAllAudio();
                return;
            }
            const item = audioQueue[index];
            const utterance = new SpeechSynthesisUtterance(item.text);
            utterance.lang = 'en-GB';

            const voice = getVoiceForId(item.id);
            if (voice) utterance.voice = voice;

            utterance.onend = () => {
                index++;
                if (index < audioQueue.length && !isPaused) {
                    audioTimeout = setTimeout(playNext, gapSec * 1000);
                } else if (index >= audioQueue.length) {
                    stopAllAudio();
                }
            };
            utterance.onerror = () => {
                index++;
                if (index < audioQueue.length && !isPaused) {
                    audioTimeout = setTimeout(playNext, gapSec * 1000);
                }
            };
            speechSynthesis.speak(utterance);
        };
        playNext();
    }

    function splitTextWithUnderscores(text) {
        const parts = [];
        let lastIndex = 0;
        const regex = /_+/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            if (match.index > lastIndex) {
                parts.push({ type: 'text', content: text.substring(lastIndex, match.index) });
            }
            parts.push({ type: 'blank', content: match[0] });
            lastIndex = match.index + match[0].length;
        }
        if (lastIndex < text.length) {
            parts.push({ type: 'text', content: text.substring(lastIndex) });
        }
        return parts;
    }

    function speakSingleText(text, id) {
        if (!text || text.trim() === '') return;
        const parts = splitTextWithUnderscores(text);
        
        if (parts.length === 1 && parts[0].type === 'text') {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB';
            const voice = getVoiceForId(id);
            if (voice) utterance.voice = voice;
            speechSynthesis.speak(utterance);
            return;
        }

        speechSynthesis.cancel();

        let currentIndex = 0;

        const speakNext = () => {
            if (currentIndex >= parts.length) return;
            const part = parts[currentIndex];
            let textToSpeak = part.content;
            if (part.type === 'blank') {
                textToSpeak = 'blank';
            }
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-GB';
            const voice = getVoiceForId(id);
            if (voice) utterance.voice = voice;

            utterance.onend = () => {
                currentIndex++;
                if (part.type === 'blank') {
                    setTimeout(speakNext, 300);
                } else {
                    speakNext();
                }
            };
            utterance.onerror = () => {
                currentIndex++;
                if (part.type === 'blank') {
                    setTimeout(speakNext, 300);
                } else {
                    speakNext();
                }
            };
            speechSynthesis.speak(utterance);
        };

        speakNext();
    }

        if (!('speechSynthesis' in window)) return;
        const voices = speechSynthesis.getVoices();
        voiceList = sortVoicesByPlatform(voices);
        const davidVoice = voiceList.find(v =>

    function updateVoiceDropdowns(preferredVoice = null) {
        const singleSelect = document.getElementById('voiceSelect');
        const oddSelect = document.getElementById('oddVoiceSelect');
        const evenSelect = document.getElementById('evenVoiceSelect');
        if (!singleSelect || !oddSelect || !evenSelect) return;

        const fillSelect = (select) => {
            select.innerHTML = '';
            const emptyOpt = document.createElement('option');
            emptyOpt.value = '';
            emptyOpt.textContent = '-- Chọn giọng --';
            select.appendChild(emptyOpt);

            voiceList.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.voiceURI;
                opt.textContent = `${v.name} (${v.lang})${v.default ? ' [Mặc định]' : ''}`;
                if (preferredVoice && v.voiceURI === preferredVoice.voiceURI) {
                    opt.selected = true;
                }
                select.appendChild(opt);
            });
        };
        fillSelect(singleSelect);
        fillSelect(oddSelect);
        fillSelect(evenSelect);

        singleVoice = singleSelect.value ? voiceList.find(v => v.voiceURI === singleSelect.value) : null;
        oddVoice = oddSelect.value ? voiceList.find(v => v.voiceURI === oddSelect.value) : null;
        evenVoice = evenSelect.value ? voiceList.find(v => v.voiceURI === evenSelect.value) : null;
    }

            if (!unitLessons) {

                return false;
            }
            const availableBais = Object.keys(unitLessons);
            const validBais = availableBais.filter(b => isLessonValid(unitLessons[b]));
            if (validBais.length === 0) {
                alert(`Unit ${selectedUnit} chưa có bài nào có dữ liệu.`);
                return false;
            }
            const randomBai = validBais[Math.floor(Math.random() * validBais.length)];
            baiNumber = randomBai.substring(1);
            rawData = unitLessons[randomBai];
        } else {
            baiNumber = selectedBai.replace('BÀI ', '');
            rawData = LESSON_REGISTRY['4']?.[unitKey]?.[`B${baiNumber}`];
            if (!rawData) {
                alert(`Không tìm thấy dữ liệu cho ${selectedUnit} - ${selectedBai}.`);
                return false;
            }
            if (!isLessonValid(rawData)) {
                alert(`Bài ${selectedBai} trong ${selectedUnit} chưa có nội dung.`);
                return false;
            }
        }

        if (!rawData) {
            alert(`Không tìm thấy dữ liệu cho ${selectedUnit} - ${selectedBai}.`);
            return false;
        }

        currentLessonData = rawData;

        let questionPool = [];
        let numberOfQuestions = 5;

        if (selectedDang === 'TRẮC NGHIỆM TỔNG HỢP') {
            const p1 = rawData.P1 || [];
            const p2 = rawData.P2 || [];
            const p3 = rawData.P3 || [];
            questionPool = [...p1, ...p2, ...p3];
            numberOfQuestions = 10;
        } else if (selectedDang.includes('TRẮC NGHIỆM TRẢ LỜI CÂU HỎI')) {
            questionPool = rawData.P1 || [];
        } else if (selectedDang.includes('TRUE – FALSE')) {
            questionPool = rawData.P2 || [];
        } else if (selectedDang.includes('ĐIỀN KHUYẾT')) {
            questionPool = rawData.P3 || [];
        }

        if (!questionPool.length) {
            alert('Dạng bài này chưa có câu hỏi.');
            return false;
        }

        const shuffled = [...questionPool].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, Math.min(numberOfQuestions, shuffled.length));

        quizData = selected.map(q => {
            let opts = [q.correct, q.wrong1, q.wrong2];
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                id: q.id,
                question: q.word,
                options: opts,
                correct: q.correct
            };
        });
        return true;
    }

                            <span style="color: ${color};">${Math.round(percent)}%</span>
                        </div>
                        <div style="font-weight:bold; color:#1e3c72; margin-top:15px;">${new Date().toLocaleDateString()}</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item"><div>⏱️ START</div><div>${startStr}</div></div>
                        <div class="stat-item"><div>⌛ END</div><div>${endStr}</div></div>
                        <div class="stat-item"><div>🔗 CHUỖI</div><div>${maxStreak}/${correctCount}/${total}</div></div>
                        <div class="stat-item"><div>⏳ Tổng</div><div>${totalTime}s</div></div>
                    </div>
                </div>

                <div class="audio-panel" id="audioPanelReport">
                    <span class="speaker-icon" id="playSpeakerReport">🔊</span>
                    <select id="gapTimeSelectReport">
                        <option value="0.25">0.25s</option>
                        <option value="0.5" selected>0.5s</option>
                        <option value="0.75">0.75s</option>
                        <option value="1">1s</option>
                        <option value="2">2s</option>
                        <option value="3">3s</option>
                        <option value="4">4s</option>
                        <option value="5">5s</option>
                        <option value="6">6s</option>
                    </select>
                    <select id="loopCountSelectReport">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                    <button id="pauseAudioBtnReport">⏸️</button><button id="stopAudioBtnReport">⏹️</button>
                </div>
                <div style="display: flex; flex-wrap: wrap; gap: 16px; margin: 10px 0 20px; align-items: center; background: #e0ebf9; padding: 12px 20px; border-radius: 40px;">
                    <label style="font-weight:600;">Số giọng:
                        <select id="voiceModeSelectReport" style="padding:6px 12px;">
                            <option value="1" selected>1 giọng</option>
                            <option value="2">2 giọng</option>
                        </select>
                    </label>
                    <div id="singleVoiceContainerReport" style="display: flex; gap:10px;">
                        <label>Giọng: <select id="voiceSelectReport"></select></label>
                    </div>
                    <div id="dualVoiceContainerReport" style="display: none; gap:10px; flex-wrap:wrap;">
                        <label>Giọng lẻ: <select id="oddVoiceSelectReport"></select></label>
                        <label>Giọng chẵn: <select id="evenVoiceSelectReport"></select></label>
                    </div>
                </div>

                <button class="btn" id="togglePassageBtn">📄 HIỆN đoạn văn P4</button>
                <div id="passageContainer" style="display:none;" class="hidden-passage">${passageText}</div>
                
                <h3>📋 Chi tiết câu hỏi</h3>
                <table><thead><tr><th>STT</th><th>Nội dung</th><th>Đáp án chọn</th><th>Đáp án đúng</th></tr></thead><tbody>`;
        quizData.forEach((q,i)=>{
            let chosen = userAnswers[i]?.chosen || '—';
            let correct = q.correct;
            let wrongClass = (chosen !== correct) ? 'wrong-answer' : '';
            html += `<tr><td>${i+1}</td><td>${q.question}</td><td class="${wrongClass}">${chosen}</td><td><span class="correct-answer">${correct}</span></td></tr>`;
        });
        html += `</tbody></table><br>
                <div class="action-buttons-container">
                    <button class="btn-back" id="backToMainBtnReport">◀ QUAY LẠI</button>
                    <a href="#" class="scroll-top" id="scrollTopReport">⬆️</a>
                </div>
            </div>`;
        app.innerHTML = html;

        // Xử lý voice dropdowns trong report (giống quiz)
        if (voiceList.length) {
            const davidVoice = voiceList.find(v => 
                v.name.toLowerCase().includes('david') && 
                (v.lang.includes('en-GB') || v.lang.includes('en-US'))
            );
            const singleSel = document.getElementById('voiceSelectReport');
            const oddSel = document.getElementById('oddVoiceSelectReport');
            const evenSel = document.getElementById('evenVoiceSelectReport');
            if (singleSel && oddSel && evenSel) {
                const fill = (sel) => {
                    sel.innerHTML = '';
                    const emptyOpt = document.createElement('option');
                    emptyOpt.value = '';
                    emptyOpt.textContent = '-- Chọn giọng --';
                    sel.appendChild(emptyOpt);
                    voiceList.forEach(v => {
                        let opt = document.createElement('option');
                        opt.value = v.voiceURI;
                        opt.textContent = `${v.name} (${v.lang})`;
                        if (davidVoice && v.voiceURI === davidVoice.voiceURI) opt.selected = true;
                        sel.appendChild(opt);
                    });
                };
                fill(singleSel);
                fill(oddSel);
                fill(evenSel);
            }
        }

        const modeSel = document.getElementById('voiceModeSelectReport');
        const singleDiv = document.getElementById('singleVoiceContainerReport');
        const dualDiv = document.getElementById('dualVoiceContainerReport');
        modeSel.addEventListener('change', e => {
            voiceMode = parseInt(e.target.value);
            singleDiv.style.display = voiceMode === 1 ? 'flex' : 'none';
            dualDiv.style.display = voiceMode === 2 ? 'flex' : 'none';
        });
        document.getElementById('voiceSelectReport')?.addEventListener('change', e => {
            singleVoice = e.target.value ? voiceList.find(v => v.voiceURI === e.target.value) : null;
        });
        document.getElementById('oddVoiceSelectReport')?.addEventListener('change', e => {
            oddVoice = e.target.value ? voiceList.find(v => v.voiceURI === e.target.value) : null;
        });
        document.getElementById('evenVoiceSelectReport')?.addEventListener('change', e => {
            evenVoice = e.target.value ? voiceList.find(v => v.voiceURI === e.target.value) : null;
        });

        document.getElementById('playSpeakerReport').addEventListener('click', ()=>{
            if (currentLessonData && currentLessonData.P5) {
                let gap = parseFloat(document.getElementById('gapTimeSelectReport').value);
                let loop = parseInt(document.getElementById('loopCountSelectReport').value);
                playAudioSentences(currentLessonData.P5, gap, loop);
            }
        });
        document.getElementById('pauseAudioBtnReport').addEventListener('click', ()=>{
            if (isPaused) resumeAudio(); else pauseAudio();
        });
        document.getElementById('stopAudioBtnReport').addEventListener('click', stopAllAudio);
        document.getElementById('togglePassageBtn').addEventListener('click', ()=>{
            let c = document.getElementById('passageContainer');
            c.style.display = c.style.display === 'none' ? 'block' : 'none';
        });
        document.getElementById('backToMainBtnReport').addEventListener('click', ()=>{ stopAllAudio(); currentScreen='main'; render(); scrollToTop(); });
        document.getElementById('scrollTopReport').addEventListener('click', e=>{ e.preventDefault(); scrollToTop(); });
    }

    function render() {
        if (currentScreen === 'main') renderMain();
        else if (currentScreen === 'quiz') renderQuiz();
        else if (currentScreen === 'report') renderReport();
    }

    render();
</script>
</body>
</html>
